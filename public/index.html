<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wrong German Proverbs API</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: #141b34;
        --text: #e8ecff;
        --muted: #a8b1d9;
        --accent: #7c9cff;
        --accent-2: #50e3c2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: radial-gradient(1200px 700px at 20% -20%, #253261 0%, transparent 60%), var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 48px 20px;
      }
      .card {
        background: linear-gradient(180deg, #1a2448 0%, var(--card) 100%);
        border: 1px solid #2c3768;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 16px 42px rgba(0,0,0,.35);
      }
      h1 { margin: 0 0 8px; font-size: 32px; }
      p { color: var(--muted); margin-top: 0; }
      .row { display: flex; flex-wrap: wrap; gap: 12px; margin: 18px 0 8px; }
      .chip {
        background: #0f1530;
        border: 1px solid #2e3a70;
        color: var(--text);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 14px;
        text-decoration: none;
      }
      .proverb {
        margin-top: 16px;
        padding: 16px;
        border-radius: 12px;
        background: #0e142d;
        border: 1px solid #2a3568;
        font-size: 20px;
        line-height: 1.5;
      }
      button {
        margin-top: 14px;
        border: none;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        color: #071024;
        font-weight: 700;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
      }
      footer { margin-top: 20px; color: var(--muted); font-size: 13px; }
      footer a { color: var(--accent-2); text-decoration: none; }
      footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Wrong German Proverbs API</h1>
        <p>Deine API läuft ✅ — hier kannst du direkt einen zufälligen Spruch testen.</p>

        <div class="row">
          <a class="chip" href="/get" target="_blank" rel="noreferrer">GET /get</a>
          <a class="chip" href="/no" target="_blank" rel="noreferrer">GET /no (legacy)</a>
          <a class="chip" href="/healthz" target="_blank" rel="noreferrer">GET /healthz</a>
        </div>

        <div id="proverb" class="proverb">Lade einen Spruch …</div>
        <button id="reload">Neuen Spruch laden</button>

        <footer>
          <a href="https://github.com/eliasschr/wrong-german-proverbs-as-a-service" target="_blank" rel="noreferrer">Dieses Repository</a>
          ·
          <a href="https://github.com/hotheadhacker/wrong-german-proverbs-as-a-service" target="_blank" rel="noreferrer">Originales Repository</a>
        </footer>
      </section>
    </main>

    <script>
      const proverbEl = document.getElementById('proverb');
      const button = document.getElementById('reload');

      async function loadProverb() {
        try {
          const response = await fetch('/get');
          if (!response.ok) throw new Error('Request failed');
          const data = await response.json();
          proverbEl.textContent = data.proverb || 'Kein Spruch gefunden.';
        } catch (error) {
          proverbEl.textContent = 'Fehler beim Laden des Spruchs.';
        }
      }

      button.addEventListener('click', loadProverb);
      loadProverb();
    </script>
  </body>
</html>
